<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TrakX — Fonterra Maungaturoto 26</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e3a5f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TrakX">
<link rel="apple-touch-icon" href="icon-192.png">
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}</script>
<link rel="stylesheet" href="assets/trakx.css">
</head>
<body data-page="dashboard" data-version="V0.08">
<script src="assets/nav.js" defer></script>

<main class="container">
  <div class="mb-6 flex items-baseline justify-between gap-3">
    <div>
      <div class="text-muted text-xs uppercase font-semibold">Fonterra</div>
      <h1>Maungaturoto 26 — Operations Dashboard</h1>
    </div>
    <a href="submit.html?p=fonterra-m26" class="btn btn-blue hide-mobile">+ New entry</a>
  </div>

  <div class="kpi-grid" id="kpis">
    <div class="kpi"><div class="loading">Loading…</div></div>
  </div>

  <section class="card">
    <div class="card-header">
      <span>Zones vs PO target</span>
      <span class="sub" id="zones-sub"></span>
    </div>
    <div id="zones" class="flex" style="flex-direction:column;gap:18px"></div>
  </section>

  <section class="grid-4 mb-4">
    <a href="submit.html?p=fonterra-m26" class="tile">
      <div class="tile-eyebrow">Public form</div>
      <div class="tile-title">Submit hours / materials</div>
      <div class="tile-sub">Subbie smartform</div>
    </a>
    <a href="approve.html" class="tile">
      <div class="tile-eyebrow">PM</div>
      <div class="tile-title">Approve pending entries</div>
      <div class="tile-sub" id="pending-sub">—</div>
      <span class="tile-pill badge badge-amber" id="pending-pill" hidden></span>
    </a>
    <a href="ap.html" class="tile">
      <div class="tile-eyebrow">Office</div>
      <div class="tile-title">Accounts Payable</div>
      <div class="tile-sub" id="ap-sub">What we owe</div>
    </a>
    <a href="ar.html" class="tile">
      <div class="tile-eyebrow">Office</div>
      <div class="tile-title">Accounts Receivable</div>
      <div class="tile-sub" id="ar-sub">To invoice customer</div>
    </a>
  </section>

  <p class="trakx-footer">
    See <a href="https://github.com/JMWAITE1/trakx-app/blob/main/TODO.md" target="_blank">TODO.md</a> for what's next.
  </p>
</main>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const sb = createClient(
  'https://uhodycdbkwocvptiffks.supabase.co',
  'sb_publishable_TKWfAttrdywsm1BOMUMNlw_FjMolZO5'
);
const fmt = c => '$' + (Math.round(c / 100)).toLocaleString();
const pct = n => (n == null ? '—' : (+n).toFixed(0) + '%');

const { data: zones } = await sb
  .from('v_trakx_zone_rollup')
  .select('*')
  .order('zone_name');

let totalRevenue = 0, totalCost = 0, totalGp = 0, totalTarget = 0, totalHours = 0;
for (const z of (zones || [])) {
  totalRevenue += z.revenue_actual_cents;
  totalCost    += z.total_cost_cents;
  totalGp      += z.gp_cents;
  totalTarget  += z.revenue_target_cents;
  totalHours   += +z.total_hours;
}
const totalGpPct = totalRevenue > 0 ? (100 * totalGp / totalRevenue) : 0;
const overallPctTarget = totalTarget > 0 ? (100 * totalRevenue / totalTarget) : 0;

document.getElementById('kpis').innerHTML = [
  { label:'Turnover',     value: fmt(totalRevenue),         sub: `of ${fmt(totalTarget)} (${pct(overallPctTarget)})`, accent:'blue'  },
  { label:'Total Cost',   value: fmt(totalCost),            sub: '', accent:'gray'  },
  { label:'Total GP $',   value: fmt(totalGp),              sub: '', accent:'gold'  },
  { label:'GP %',         value: pct(totalGpPct),           sub: '', accent:'green' },
  { label:'Hours logged', value: (+totalHours).toFixed(0),  sub: '', accent:'gray'  },
].map(k => `
  <div class="kpi accent-${k.accent}">
    <div class="kpi-label">${k.label}</div>
    <div class="kpi-value">${k.value}</div>
    ${k.sub ? `<div class="kpi-sub">${k.sub}</div>` : ''}
  </div>
`).join('');

document.getElementById('zones-sub').textContent =
  `${zones?.length || 0} zones • ${fmt(totalRevenue)} of ${fmt(totalTarget)}`;

document.getElementById('zones').innerHTML = (zones || []).map(z => {
  const p = Math.min(100, +z.pct_complete || 0);
  const over = (+z.pct_complete || 0) > 100;
  const remaining = z.revenue_target_cents - z.revenue_actual_cents;
  const alertSoon = !over && remaining < 200000 && z.revenue_target_cents > 0;
  const cls = over ? 'red' : alertSoon ? 'amber' : '';
  const tag = over
    ? `<span class="badge badge-red">OVER by ${fmt(-remaining)}</span>`
    : alertSoon
      ? `<span class="badge badge-amber">${fmt(remaining)} left</span>`
      : '';
  return `
    <div class="progress">
      <div class="progress-meta">
        <span class="progress-name">${z.zone_name} ${tag}</span>
        <span class="progress-vals">${fmt(z.revenue_actual_cents)} of ${fmt(z.revenue_target_cents)} <strong>${pct(z.pct_complete)}</strong></span>
      </div>
      <div class="progress-track"><div class="progress-bar ${cls}" style="width:${p}%"></div></div>
      <div class="progress-foot">
        <span>${(+z.total_hours).toFixed(0)} hours logged</span>
        <span>GP ${fmt(z.gp_cents)} (${pct(z.gp_pct)})</span>
      </div>
    </div>
  `;
}).join('') || '<div class="empty"><div class="icon">📋</div>No zones found.</div>';

const { count } = await sb
  .from('trakx_entries')
  .select('id', { count: 'exact', head: true })
  .eq('approved', false);
if (count && count > 0) {
  const pill = document.getElementById('pending-pill');
  pill.textContent = count;
  pill.hidden = false;
  document.getElementById('pending-sub').textContent = `${count} waiting for PM`;
} else {
  document.getElementById('pending-sub').textContent = 'All caught up';
}

const { data: ap } = await sb.from('v_trakx_ap').select('total_cost_cents');
const apSum = (ap || []).reduce((a, r) => a + r.total_cost_cents, 0);
document.getElementById('ap-sub').textContent = `${fmt(apSum)} • ${(ap || []).length} lines`;

const { data: ar } = await sb.from('v_trakx_ar').select('sell_price_cents');
const arSum = (ar || []).reduce((a, r) => a + r.sell_price_cents, 0);
document.getElementById('ar-sub').textContent = `${fmt(arSum)} • ${(ar || []).length} lines`;
</script>
</body>
</html>
