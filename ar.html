<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TrakX — Accounts Receivable</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e3a5f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TrakX">
<link rel="apple-touch-icon" href="icon-192.png">
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}</script>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
<div class="version-badge fixed top-2 right-2 text-xs text-gray-400">V0.07</div>

<div class="max-w-6xl mx-auto px-4 py-6">
  <a href="index.html" class="text-sm text-blue-700 hover:underline">← Back</a>
  <div class="flex items-baseline justify-between mt-2 mb-4">
    <h1 class="text-2xl font-bold">Accounts Receivable</h1>
    <button id="export-csv" class="text-sm text-blue-700 hover:underline">Export CSV</button>
  </div>
  <p class="text-gray-500 mb-4">What to invoice the customer. Approved entries only.</p>

  <div id="content" class="space-y-4 text-sm"></div>
  <div id="grand" class="mt-6 p-4 bg-blue-50 rounded-lg font-semibold text-lg flex justify-between"></div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const sb = createClient(
  'https://uhodycdbkwocvptiffks.supabase.co',
  'sb_publishable_TKWfAttrdywsm1BOMUMNlw_FjMolZO5'
);
const fmt = c => '$' + (Math.round(c / 100)).toLocaleString();

const { data, error } = await sb.from('v_trakx_ar').select('*').order('date');
const $  = document.getElementById('content');
const $g = document.getElementById('grand');

if (error) { $.textContent = 'Error: ' + error.message; }
else if (!data?.length) { $.innerHTML = '<div class="italic text-gray-500">No approved entries yet.</div>'; }
else {
  const groups = {};
  for (const r of data) (groups[r.zone_name] ||= []).push(r);
  let grandTotal = 0;
  $.innerHTML = Object.entries(groups).map(([zone, rows]) => {
    const total = rows.reduce((a, r) => a + r.sell_price_cents, 0);
    grandTotal += total;
    return `
      <details class="bg-white rounded-lg shadow-sm" open>
        <summary class="px-4 py-3 cursor-pointer font-semibold flex justify-between">
          <span>${zone} <span class="text-gray-500 font-normal text-xs">(${rows.length} lines)</span></span>
          <span>${fmt(total)}</span>
        </summary>
        <table class="w-full text-xs">
          <thead class="bg-gray-50 text-gray-600 text-left">
            <tr>
              <th class="px-3 py-1.5">Date</th>
              <th class="px-3 py-1.5">Name</th>
              <th class="px-3 py-1.5">Company</th>
              <th class="px-3 py-1.5">Type</th>
              <th class="px-3 py-1.5 text-right">Labour</th>
              <th class="px-3 py-1.5 text-right">Travel</th>
              <th class="px-3 py-1.5 text-right">Accom</th>
              <th class="px-3 py-1.5 text-right">Mats</th>
              <th class="px-3 py-1.5 text-right">Total</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(r => `
              <tr class="border-t">
                <td class="px-3 py-1.5">${r.date}</td>
                <td class="px-3 py-1.5">${r.person_name}</td>
                <td class="px-3 py-1.5 text-gray-600">${r.company_name}</td>
                <td class="px-3 py-1.5 text-gray-600">${r.type}</td>
                <td class="px-3 py-1.5 text-right">${fmt(r.labour_sell_cents)}</td>
                <td class="px-3 py-1.5 text-right">${fmt(r.travel_sell_cents)}</td>
                <td class="px-3 py-1.5 text-right">${fmt(r.accom_sell_cents)}</td>
                <td class="px-3 py-1.5 text-right">${fmt(r.materials_sell_cents)}</td>
                <td class="px-3 py-1.5 text-right font-medium">${fmt(r.sell_price_cents)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </details>
    `;
  }).join('');
  $g.innerHTML = `<span>Total to invoice</span><span>${fmt(grandTotal)}</span>`;
}

document.getElementById('export-csv').addEventListener('click', () => {
  if (!data?.length) return;
  const cols = ['date','zone_name','person_name','company_name','type',
                'labour_sell_cents','travel_sell_cents','accom_sell_cents',
                'materials_sell_cents','equipment_sell_cents','sell_price_cents'];
  const csv = [cols.join(',')].concat(
    data.map(r => cols.map(c => {
      let v = r[c]; if (v === null || v === undefined) v = '';
      if (typeof v === 'string' && v.includes(',')) v = `"${v}"`;
      return v;
    }).join(','))
  ).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `trakx-ar-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
});
</script>
</body>
</html>
